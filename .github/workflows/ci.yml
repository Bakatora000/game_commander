name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make test scripts executable
        run: chmod +x tools/test_modularization.sh tools/github_preflight.sh

      - name: Bash syntax check
        run: |
          bash -n game_commander.sh
          bash -n lib/helpers.sh
          bash -n lib/nginx.sh
          bash -n lib/cmd_deploy.sh
          bash -n lib/cmd_status.sh
          bash -n lib/cmd_uninstall.sh
          bash -n tools/test_modularization.sh
          bash -n tools/github_preflight.sh

      - name: Python tool tests
        run: python3 tools/test_tools.py

      - name: Modularization checks
        run: ./tools/test_modularization.sh
